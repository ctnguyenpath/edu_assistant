services:
  # --- 1. Relational DB (PostgreSQL) ---
  postgres:
    image: postgres:15-alpine
    container_name: edu_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abvn1234
      POSTGRES_DB: course_management 
      PGPORT: 5435
    ports:
      - "5435:5435"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/sql_syntax:/docker-entrypoint-initdb.d
    networks:
      - edu_app_bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d course_management -p 5435"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. NoSQL & Vector DBs ---
  mongo:
    image: mongo:latest
    container_name: edu_mongo_db
    restart: always
    command: ["--port", "27020"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: abvn1234
    ports:
      - "27020:27020"
    volumes:
      - mongo_data:/data/db
    networks:
      - edu_app_bridge
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27020/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: edu_qdrant_db
    restart: always
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6336
    ports:
      - "6336:6336"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - edu_app_bridge

  # --- 3. Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: edu_minio
    restart: always
    command: server /data --address ":9004" --console-address ":9005"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9004:9004"
      - "9005:9005"
    volumes:
      - minio_data:/data
    networks:
      - edu_app_bridge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # --- 4. Management ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: edu_portainer
    restart: always
    # Forces Portainer to listen on 9906 internally
    command: -H unix:///var/run/docker.sock --addr :9906
    ports:
      - "9906:9906" 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - edu_app_bridge

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:
  minio_data:
  portainer_data:

networks:
  edu_app_bridge:
    external: true