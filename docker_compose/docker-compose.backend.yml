services:
  # -----------------------------------------------------------------
  # 1. CHATBOT SERVICE (Python/Parlant)
  # -----------------------------------------------------------------
  chatbot:
    container_name: edu_chatbot_backend
    build: ../backend
    restart: always
    ports:
      - "8802:8802"
    volumes:
      - ../backend:/app/backend
      - ${EDU_DATA_PATH}:/data
      - ${EDU_DATA_PATH}/models:/app/models
      - ../.env:/app/.env
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/backend
      
      # --- DATABASE CONFIG ---
      - MINIO_ENDPOINT=edu_minio:9004 
      - MONGO_CONNECTION_STRING=mongodb://root:abvn1234@edu_mongo_db:27020/ldc_bot?authSource=admin 
      - QDRANT_HOST=edu_qdrant_db
      - QDRANT_PORT=6336 
      - DB_HOST=edu_postgres_db
      - DB_PORT=5435 
      - DB_NAME=course_management
      
      - UPLOAD_SERVICE_INTERNAL_URL=http://upload_service:8000
      
      - VIDEO_CLIP_PATH=/data/video_clip
      - RAW_INPUT_PATH=/data/raw_input
      - OUTPUT_PATH=/data/output
      - INPUT_PATH=/data/input
      
      # CPU MODE
      - USE_GPU=false 

    networks:
      - edu_app_bridge 
    working_dir: /app/backend
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." -- python main_chatbot_multiple.py

  # -----------------------------------------------------------------
  # 2. AUTH SERVER (FastAPI)
  # -----------------------------------------------------------------
  auth:
    container_name: edu_auth_server
    build: ../backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../.env:/app/.env
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/backend
      - DB_HOST=edu_postgres_db
      - DB_PORT=5435 
      - DB_NAME=course_management
      - DB_TYPE=postgres
    networks:
      - edu_app_bridge 
    working_dir: /app/backend
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." -- python auth_server.py

  # -----------------------------------------------------------------
  # 3. DATA OPS API (FastAPI)
  # -----------------------------------------------------------------
  data_ops:
    container_name: edu_data_ops_backend
    build: ../backend
    restart: always
    ports:
      - "8801:8801"
    volumes:
      - ../backend:/app/backend
      - ${EDU_DATA_PATH}:/data
      - ${EDU_DATA_PATH}/models:/app/models
      - ../.env:/app/.env
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/backend
      
      # --- DATABASE CONFIG ---
      - DB_HOST=edu_postgres_db
      - DB_PORT=5435 
      - DB_NAME=course_management
      - SQL_HOST=edu_postgres_db
      - SQL_PORT=5435 
      - MONGO_HOST=edu_mongo_db
      - MONGO_PORT=27020

      - VIDEO_CLIP_PATH=/data/video_clip
      - RAW_INPUT_PATH=/data/raw_input
      - OUTPUT_PATH=/data/output
      - INPUT_PATH=/data/input

    networks:
      - edu_app_bridge 
    working_dir: /app/backend
    # Using modular path and polling reload to prevent I/O errors on Windows
    command: uvicorn main_data_ops:app --host 0.0.0.0 --port 8801 --reload

  # -----------------------------------------------------------------
  # 4. FILE UPLOAD SERVICE
  # -----------------------------------------------------------------
  upload_service:
    container_name: edu_upload_service
    build: ../upload_service
    restart: always
    ports:
      - "8005:8000"
    volumes:
      - ../upload_service:/app
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - MINIO_ENDPOINT=edu_minio:9004
      - UPLOAD_MONGO_URI=${UPLOAD_MONGO_URI}
    networks:
      - edu_app_bridge 
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-delay 0.5

networks:
  edu_app_bridge:
    external: true